name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Install ripgrep on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install ripgrep on macOS
        if: runner.os == 'macOS'
        run: brew install ripgrep

      - name: Install ripgrep on Windows
        if: runner.os == 'Windows'
        run: choco install ripgrep --no-progress -y

      - name: Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/structured-knowledge-filesystem
